services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traceoflight-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 6543
    expose:
      - "6543"
    networks:
      - edge

networks:
  edge:
    external: true
    name: traceoflight-edge
