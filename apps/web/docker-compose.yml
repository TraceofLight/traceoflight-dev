services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traceoflight-frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT}
      SITE_URL: ${SITE_URL}
      CONTENT_PROVIDER: ${CONTENT_PROVIDER}
      API_BASE_URL: ${API_BASE_URL}
    expose:
      - "${PORT}"
    networks:
      - edge

networks:
  edge:
    external: true
    name: traceoflight-edge
