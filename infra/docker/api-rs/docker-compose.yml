name: traceoflight-api-rs-stack

# Canonical backend (Axum/Rust). postgres/redis/minio are owned by the
# `traceoflight-api-stack` infra compose; bring that up first.

services:
  api-rs:
    build:
      context: ../../../apps/api-rs
      dockerfile: Dockerfile
    image: traceoflight-api-rs-stack-api:latest
    container_name: traceoflight-api-rs
    restart: unless-stopped
    env_file:
      - ../../../apps/api-rs/.env.api-rs
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      API_RS_PORT: ${API_RS_PORT}
    expose:
      - "${API_RS_PORT}"
    networks:
      - edge
      - api_internal

networks:
  edge:
    external: true
    name: traceoflight-edge
  api_internal:
    external: true
    name: traceoflight-api-stack_api_internal
